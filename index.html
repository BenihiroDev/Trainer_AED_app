<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Trainer AED</title> 
        <link rel="stylesheet" href="style.css">
    </head>
    <body>

        <div class="aed-body">
            <div class="aed-button-column">

                <div id="power-outline"></div>
                <button id="power-button">power</button>

                <div id="shock-outline"></div>
                <div id="shock-duller"></div>
                <div id="shock-button"></div>
                <div id="shock-icon">shock</div>
                

                <div id="white-box">
                 <p>Training only <br><br> Not for <br> Clinical Use</p>
                </div>

                <div id="one-box">1</div>
                <div id="two-box">2</div>   
                <div id="three-box">3</div>
            </div>    
          <div id="pad-connector">Pads</div>
        </div>
    
        <div id="pad-popup" class="hidden">
         <div class="popup-content">
            
            <img src="images/body.jpg" id="body-image" alt="Body diagram">

            <div class="target-zone" id="zone1"></div>
            <div class="target-zone" id="zone2"></div>

            <div class="pad" id="pad1">Pad 1</div>
            <div class="pad" id="pad2">Pad 2</div>

            <button id="close-popup">Close</button>

         </div>
        </div>
        
    <script src="script.js"></script>

    </body>
</html>
