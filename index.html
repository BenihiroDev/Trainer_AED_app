<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Trainer AED</title> 
        <link rel="stylesheet" href="style.css">
    </head>
    <body>

        <div class="aed-body">
            <div class="aed-button-column">

                <div id="power-outline"></div>
                <button id="power-button"><span class="button-icon power-icon">⏻</span></button>

                <div id="indic-bulb-1"></div>
                <div id="indic-bulb-2"></div>


                <div id="shock-outline"></div>
                <button id="shock-button" type="button" aria-label="Shock"><span class="button-icon shock-icon">⚡</span></button>
                

                <div id="white-box">
                 <p>apply pads<br>(click the pads button)</p>
                </div>

                <div id="one-box">1</div>
                <div id="two-box">2</div>   
                <div id="three-box">3</div>
            </div>    
                    <button id="pad-connector" type="button">Pads</button>
        </div>
    
        <div id="pad-popup" class="hidden">
         <div class="popup-content">
            
            <img src="images/body.jpg" id="body-image" alt="Body diagram">

            <div class="target-zone" id="zone1"></div>
            <div class="target-zone" id="zone2"></div>

            <div class="pad" id="pad1">Pad 1</div>
            <div class="pad" id="pad2">Pad 2</div>

            <button id="close-popup">Close</button>

         </div>
        </div>
        
    <script src="script.js"></script>

    </body>
</html>
